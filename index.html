<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Made Simple · Book 2 · Ready-to-Copy Prompts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="./AI Made Simple · Book 2 · Ready-to-Copy Prompts_files/css2" rel="stylesheet">
  <style>
    :root {
      --navy:       #0E1C36;
      --navy-card:  #162035;
      --navy-inner: #0A1526;
      --blue:       #2563EB;
      --blue-light: #3B82F6;
      --glow:       #818CF8;
      --orange:     #F97316;
      --orange-dim: #C2570A;
      --white:      #F1F5F9;
      --muted:      #94A3B8;
      --border:     #1E3050;
      --green:      #22C55E;
      --green-dim:  #15803D;
      --red:        #EF4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── EKRAN LOGOWANIA ── */
    #ekran-logowania {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      overflow-y: auto;
    }

    .logowanie-wrapper {
      margin: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }

    .login-box {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }

    .login-badge {
      display: inline-block;
      background: rgba(249,115,22,0.1);
      color: var(--orange);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid rgba(249,115,22,0.3);
      margin-bottom: 20px;
    }

    .login-box h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 30%, var(--glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-box p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .login-box p strong {
      color: var(--white);
    }

    .kod-input {
      width: 100%;
      background: var(--navy-inner);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 1.1rem;
      font-family: 'Outfit', monospace;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .kod-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    .kod-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.2);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    .btn-odblokuj {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }

    .btn-odblokuj:hover {
      background: var(--blue-light);
      box-shadow: 0 0 20px rgba(37,99,235,0.4);
    }

    .btn-odblokuj:active { transform: scale(0.98); }

    .error-msg {
      font-size: 0.85rem;
      color: var(--red);
      min-height: 20px;
      margin-bottom: 8px;
    }

    .login-hint {
      font-size: 0.78rem;
      color: #475569;
      margin-top: 16px;
    }

    .upsell-block {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .upsell-label {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--orange);
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 5px;
      padding: 2px 9px;
      margin-bottom: 10px;
    }

    .upsell-block p {
      font-size: 0.88rem;
      color: #CBD5E1;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .upsell-block p strong {
      color: var(--white);
    }

    .btn-amazon {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--orange);
      color: #fff;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-amazon:hover {
      background: #ea6c0a;
      box-shadow: 0 0 18px rgba(249,115,22,0.4);
    }

    .amazon-disclaimer {
      margin: 16px auto 0;
      padding: 12px 18px;
      background: rgba(37,99,235,0.06);
      border: 1px solid rgba(37,99,235,0.15);
      border-radius: 8px;
      font-size: 0.78rem;
      color: #64748B;
      line-height: 1.6;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    /* ── GŁÓWNA TREŚĆ (ukryta domyślnie) ── */
    #tresc {
      display: none;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 56px 24px 44px;
      border-bottom: 1px solid var(--border);
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .header-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(37,99,235,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .tom-badge {
      display: inline-block;
      background: var(--orange-dim);
      color: var(--orange);
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--orange-dim);
      margin-bottom: 18px;
    }

    /* POPRAWKA DLA IPHONE / SAFARI */
    header h1 {
      font-family: 'Outfit', Arial, sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    header h1 span {
      display: block;
      background: linear-gradient(135deg, #fff 30%, var(--glow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transform: translateZ(0); 
    }

    header .subtitle {
      font-size: 1.3rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .header-tip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      color: #93C5FD;
      max-width: 520px;
    }

    /* ── NAW ── */
    .chapter-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,28,54,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      justify-content: center;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .chapter-nav::-webkit-scrollbar { display: none; }

    .nav-item {
      flex-shrink: 0;
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-item:hover { color: var(--white); }
    .nav-item.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    .chapter { padding-top: 48px; }

    .chapter-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-top: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .chapter-info h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 3px;
    }

    .chapter-info p { font-size: 0.82rem; color: var(--muted); }

    .komenda-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .komenda-card:hover {
      border-color: rgba(37,99,235,0.4);
      box-shadow: 0 4px 24px rgba(37,99,235,0.08);
    }

    .komenda-head {
      display: flex;
      align-items: center;
      padding: 14px 18px 10px;
      gap: 12px;
    }

    .komenda-label {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .komenda-num {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--orange);
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 5px;
      padding: 2px 8px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .komenda-title {
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .komenda-body { padding: 0 18px 16px; }

    .komenda-tekst {
      background: var(--navy-inner);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.875rem;
      line-height: 1.7;
      color: #CBD5E1;
      white-space: pre-wrap;
      margin-bottom: 12px;
      font-family: 'DM Sans', sans-serif;
    }

    .komenda-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-kopiuj {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-kopiuj:hover { background: var(--blue-light); box-shadow: 0 0 16px rgba(37,99,235,0.4); }
    .btn-kopiuj:active { transform: scale(0.96); }
    .btn-kopiuj.success { background: var(--green-dim); }
    .btn-kopiuj.error   { background: #991B1B; }

    .copy-hint { font-size: 0.78rem; color: var(--muted); }

    .progress-bar {
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: 6px;
      padding: 12px 18px;
      margin-bottom: 32px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .progress-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--glow));
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .progress-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .progress-count { font-size: 0.78rem; color: #93C5FD; font-weight: 600; white-space: nowrap; }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 32px 20px;
      text-align: center;
    }

    .footer-tomy {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .footer-tom-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .footer-tom-link.current {
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      color: var(--orange);
      cursor: default;
    }

    .footer-tom-link.coming {
      background: var(--navy-card);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .footer-tom-link.coming:hover { border-color: rgba(37,99,235,0.3); color: #93C5FD; }
    .footer-copy { font-size: 0.78rem; color: #475569; }

    /* ── NEWSLETTER & REVIEW SECTIONS ── */
    .bonus-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 48px;
      position: relative;
      z-index: 1;
    }

    .bonus-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 36px;
      margin-bottom: 20px;
    }

    .bonus-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .bonus-card-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .bonus-card h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight:
